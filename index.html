        /*********************************************************************

        let isMuted = false;
        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playClick() {
                if (isMuted) return; this.init();
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playCorrect() {
                if (isMuted) return; this.init();
                let osc1 = this.ctx.createOscillator(), osc2 = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc1.type = 'triangle'; osc1.frequency.setValueAtTime(523.25, this.ctx.currentTime);
                osc2.type = 'sine'; osc2.frequency.setValueAtTime(659.25, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc1.connect(gain); osc2.connect(gain); gain.connect(this.ctx.destination);
                osc1.start(); osc2.start(); osc1.stop(this.ctx.currentTime + 0.3); osc2.stop(this.ctx.currentTime + 0.3);
            },
            playWrong() {
                if (isMuted) return; this.init();
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playComplete() {
                if (isMuted) return; this.init();
                let now = this.ctx.currentTime;
                let notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, index) => {
                    let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                    osc.frequency.setValueAtTime(freq, now + (index * 0.1));
                    gain.gain.setValueAtTime(0.1, now + (index * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (index * 0.1) + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + (index * 0.1)); osc.stop(now + (index * 0.1) + 0.4);
                });
            }
        };

        /*********************************************************************
         * 3. STATE MANAGEMENT & STORAGE CONTROLLER
         *********************************************************************/
        let state = {
            currentUser: "",
            currentTheme: "light",
            selectedQuantity: 10,
            activeTopicKey: null,
            sessionQuestions: [],
            currentQuestionIdx: 0,
            userAnswers: {},
            sessionScore: 0
        };

        // Algoritma Fisher-Yates Shuffle yang dijamin merawak item secara unik
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function loadApplicationState() {
            state.currentUser = localStorage.getItem("bijak_user") || "";
            state.currentTheme = localStorage.getItem("bijak_theme") || "light";
            isMuted = localStorage.getItem("bijak_muted") === "true";
            
            document.documentElement.setAttribute("data-theme", state.currentTheme);
            document.getElementById("themeBtn").textContent = state.currentTheme === "light" ? "🌙" : "☀️";
            document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🔊";

            updateProfileSelectorList();

            if (state.currentUser) {
                showUserAuthenticatedUI();
            } else {
                showScreen("registrationScreen");
            }
        }

        function saveProfile(name) {
            let usersList = JSON.parse(localStorage.getItem("bijak_users_list") || "[]");
            if (!usersList.includes(name)) {
                usersList.push(name);
                localStorage.setItem("bijak_users_list", JSON.stringify(usersList));
            }

            localStorage.setItem("bijak_user", name);
            state.currentUser = name;
            
            if (!localStorage.getItem(`bijak_history_${name}`)) {
                localStorage.setItem(`bijak_history_${name}`, JSON.stringify([]));
            }
            showUserAuthenticatedUI();
        }

        function updateProfileSelectorList() {
            let usersList = JSON.parse(localStorage.getItem("bijak_users_list") || "[]");
            let container = document.getElementById("existingProfilesList");
            let area = document.getElementById("profileSelectorArea");

            container.innerHTML = "";
            if (usersList.length > 0) {
                area.classList.remove("hidden");
                usersList.forEach(name => {
                    let chip = document.createElement("button");
                    chip.className = "profile-chip";
                    chip.textContent = name;
                    chip.addEventListener("click", () => {
                        AudioEngine.playClick();
                        saveProfile(name);
                    });
                    container.appendChild(chip);
                });
            } else {
                area.classList.add("hidden");
            }
        }

        function showUserAuthenticatedUI() {
            document.getElementById("userTagDisplay").textContent = `Welcome, ${state.currentUser}!`;
            document.getElementById("userTagDisplay").classList.remove("hidden");
            document.getElementById("logoutBtn").classList.remove("hidden");
            document.getElementById("dashWelcomeHeading").textContent = `Welcome, ${state.currentUser}!`;
            document.getElementById("quickStartBtn").classList.remove("hidden");
            document.getElementById("applicationGlobalTabBar").classList.remove("hidden");
            
            updateDashboardMetrics();
            showScreen("dashboardScreen");
        }

        function performLogout() {
            localStorage.removeItem("bijak_user");
            state.currentUser = "";
            
            document.getElementById("userTagDisplay").classList.add("hidden");
            document.getElementById("logoutBtn").classList.add("hidden");
            document.getElementById("applicationGlobalTabBar").classList.add("hidden");
            document.getElementById("studentNameInput").value = "";
            
            updateProfileSelectorList();
            showScreen("registrationScreen");
        }

        function updateDashboardMetrics() {
            if (!state.currentUser) return;
            let history = JSON.parse(localStorage.getItem(`bijak_history_${state.currentUser}`) || "[]");
            
            if (history.length === 0) {
                document.getElementById("statHighestScore").textContent = "0";
                document.getElementById("statTotalAttempts").textContent = "0";
                document.getElementById("statAvgAccuracy").textContent = "0%";
                document.getElementById("statLastPlayed").textContent = "-";
                return;
            }

            let maxScore = Math.max(...history.map(h => h.score));
            let totalCorrect = history.reduce((sum, h) => sum + h.correct, 0);
            let totalAnswered = history.reduce((sum, h) => sum + h.total, 0);
            let avgAccuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            let lastAttempt = history[history.length - 1];

            document.getElementById("statHighestScore").textContent = maxScore;
            document.getElementById("statTotalAttempts").textContent = history.length;
            document.getElementById("statAvgAccuracy").textContent = `${avgAccuracy}%`;
            document.getElementById("statLastPlayed").textContent = lastAttempt.dateTime.split(",")[0];
        }

        /*********************************************************************
         * 4. ROUTING & SCREEN VIEW CONTROLLER
         *********************************************************************/
        function showScreen(screenId) {
            const screens = ["registrationScreen", "dashboardScreen", "quizScreen", "resultsScreen", "leaderboardScreen", "statisticsScreen"];
            screens.forEach(s => document.getElementById(s).classList.add("hidden"));
            document.getElementById(screenId).classList.remove("hidden");

            document.querySelectorAll(".tab-btn").forEach(btn => {
                if (btn.getAttribute("data-target") === screenId) btn.classList.add("active");
                else btn.classList.remove("active");
            });

            if (screenId === "leaderboardScreen") populateLeaderboardTable();
            if (screenId === "statisticsScreen") populateStatisticsView();
        }

        /*********************************************************************
         * 5. KALIS PERTINDIHAN (NON-REPEATING) QUIZ ENGINE
         *********************************************************************/
        function initiateQuizSession(topicKey) {
            state.activeTopicKey = topicKey;
            
            // Klon pool soalan dari pangkalan data global untuk mengelakkan manipulasi mutasi data
            let rawPool = (topicKey === "mixed") ? generateFreshMixedPool() : JSON.parse(JSON.stringify(masterQuestionsDatabase[topicKey]));
            
            // Rawak pool soalan menggunakan Fisher-Yates
            let completelyShuffledPool = shuffleArray(rawPool);
            let qtyTarget = Math.min(state.selectedQuantity, completelyShuffledPool.length);

            // Guna kaedah `.slice()` terus daripada kedudukan had atas - ini menjamin tiada soalan pendua terpilih dalam satu sesi
            state.sessionQuestions = completelyShuffledPool.slice(0, qtyTarget);
            state.currentQuestionIdx = 0;
            state.userAnswers = {};
            state.sessionScore = 0;

            let topicMeta = topicMetadata.find(t => t.key === topicKey);
            document.getElementById("quizTopicTitle").textContent = topicMeta.title;
            document.getElementById("quizStudentName").textContent = state.currentUser;

            loadQuestionToWorkspace();
            showScreen("quizScreen");
        }

        function loadQuestionToWorkspace() {
            let qIdx = state.currentQuestionIdx;
            let qItem = state.sessionQuestions[qIdx];
            
            document.getElementById("quizQuestionCounter").textContent = `Question ${qIdx + 1} of ${state.sessionQuestions.length}`;
            let progressPct = ((qIdx + 1) / state.sessionQuestions.length) * 100;
            document.getElementById("quizProgressBar").style.width = `${progressPct}%`;
            document.getElementById("quizCurrentScore").textContent = state.sessionScore;
            document.getElementById("quizQuestionText").textContent = qItem.question;

            let container = document.getElementById("quizOptionsContainer");
            container.innerHTML = "";

            if (!qItem.shuffledOptions) {
                qItem.shuffledOptions = shuffleArray(qItem.options);
            }

            const indexesLabels = ["A", "B", "C", "D"];

            qItem.shuffledOptions.forEach((optText, i) => {
                let card = document.createElement("button");
                card.className = "option-card";
                card.setAttribute("role", "radio");
                card.setAttribute("aria-checked", "false");
                card.innerHTML = `<span class="option-idx">${indexesLabels[i]}</span> <span class="opt-txt"></span>`;
                card.querySelector(".opt-txt").textContent = optText;

                if (state.userAnswers[qIdx] !== undefined) {
                    if (optText === state.userAnswers[qIdx]) {
                        card.classList.add("selected");
                        card.setAttribute("aria-checked", "true");
                    }
                    if (optText === qItem.answer) {
                        card.classList.add("correct");
                    } else if (optText === state.userAnswers[qIdx]) {
                        card.classList.add("incorrect");
                    }
                    card.disabled = true;
                } else {
                    card.addEventListener("click", () => handleOptionSelection(optText, card));
                }
                container.appendChild(card);
            });
        }

        function handleOptionSelection(selectedText, element) {
            let qIdx = state.currentQuestionIdx;
            let qItem = state.sessionQuestions[qIdx];
            
            state.userAnswers[qIdx] = selectedText;

            if (selectedText === qItem.answer) {
                state.sessionScore += 1;
                AudioEngine.playCorrect();
            } else {
                AudioEngine.playWrong();
            }

            loadQuestionToWorkspace();

            setTimeout(() => {
                if (state.currentQuestionIdx < state.sessionQuestions.length - 1) {
                    state.currentQuestionIdx++;
                    loadQuestionToWorkspace();
                } else {
                    compileAndProcessResults();
                }
            }, 800); 
        }

        function compileAndProcessResults() {
            AudioEngine.playComplete();
            let total = state.sessionQuestions.length;
            let correct = state.sessionScore;
            let incorrect = total - correct;
            let accuracy = Math.round((correct / total) * 100);

            let grade = "E";
            if (accuracy >= 90) grade = "A";
            else if (accuracy >= 80) grade = "B";
            else if (accuracy >= 70) grade = "C";
            else if (accuracy >= 60) grade = "D";

            document.getElementById("resFinalScore").textContent = `${correct} / ${total}`;
            document.getElementById("resAccuracy").textContent = `${accuracy}%`;
            document.getElementById("resGrade").textContent = grade;

            document.getElementById("badgeBeginner").classList.toggle("unlocked", accuracy >= 50);
            document.getElementById("badgeExplorer").classList.toggle("unlocked", accuracy >= 70);
            document.getElementById("badgeChampion").classList.toggle("unlocked", accuracy >= 90);
            document.getElementById("badgeMaster").classList.toggle("unlocked", accuracy === 100);

            let entry = {
                topicKey: state.activeTopicKey,
                topicTitle: topicMetadata.find(t => t.key === state.activeTopicKey).title,
                score: correct, total: total, correct: correct, incorrect: incorrect, accuracy: accuracy,
                dateTime: new Date().toLocaleString()
            };

            let history = JSON.parse(localStorage.getItem(`bijak_history_${state.currentUser}`) || "[]");
            history.push(entry);
            localStorage.setItem(`bijak_history_${state.currentUser}`, JSON.stringify(history));

            updateGlobalLeaderboardRecords(state.currentUser, correct, accuracy);
            
            state.sessionQuestions.forEach(q => delete q.shuffledOptions);
            
            showScreen("resultsScreen");
        }

        function updateGlobalLeaderboardRecords(name, score, accuracy) {
            let leaderboard = JSON.parse(localStorage.getItem("bijak_leaderboard") || "[]");
            let userRecord = leaderboard.find(l => l.name.toLowerCase() === name.toLowerCase());

            if (userRecord) {
                if (score > userRecord.score) {
                    userRecord.score = score;
                    userRecord.accuracy = accuracy;
                }
            } else {
                leaderboard.push({ name: name, score: score, accuracy: accuracy });
            }

            leaderboard.sort((a, b) => b.score - a.score);
            localStorage.setItem("bijak_leaderboard", JSON.stringify(leaderboard));
        }

        /*********************************************************************
         * 6. LEADERBOARD
         *********************************************************************/
        function populateLeaderboardTable() {
            let leaderboard = JSON.parse(localStorage.getItem("bijak_leaderboard") || "[]");
            let tbody = document.querySelector("#leaderboardTable tbody");
            tbody.innerHTML = "";

            if (leaderboard.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No records registered yet. Be the first!</td></tr>`;
                return;
            }

            leaderboard.forEach((record, idx) => {
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${idx + 1}</strong></td>
                    <td>${record.name}</td>
                    <td><span style="color:var(--primary); font-weight:bold;">${record.score}</span></td>
                    <td>${record.accuracy}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        /*********************************************************************
         * 7. ANALYTICS & CANVAS CHART
         *********************************************************************/
        function populateStatisticsView() {
            if (!state.currentUser) return;
            let history = JSON.parse(localStorage.getItem(`bijak_history_${state.currentUser}`) || "[]");

            let totalQuizzes = history.length;
            let totalQuestions = history.reduce((sum, h) => sum + h.total, 0);
            let totalCorrect = history.reduce((sum, h) => sum + h.correct, 0);
            let totalIncorrect = history.reduce((sum, h) => sum + h.incorrect, 0);

            document.getElementById("statsTotalQuizzes").textContent = totalQuizzes;
            document.getElementById("statsTotalQuestions").textContent = totalQuestions;
            document.getElementById("statsTotalCorrect").textContent = totalCorrect;
            document.getElementById("statsTotalIncorrect").textContent = totalIncorrect;

            renderPureCanvasPieChart(totalCorrect, totalIncorrect);
        }

        function renderPureCanvasPieChart(correct, incorrect) {
            const canvas = document.getElementById("statsCustomCanvasChart");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let total = correct + incorrect;
            if (total === 0) {
                ctx.fillStyle = "#718096"; ctx.font = "16px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("No practice data items logged yet.", canvas.width / 2, canvas.height / 2);
                return;
            }

            let correctPct = correct / total;
            let incorrectPct = incorrect / total;
            let centerX = canvas.width / 2; let centerY = canvas.height / 2 - 20; let radius = 80;

            ctx.beginPath(); ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2 * correctPct);
            ctx.fillStyle = "#10b981"; ctx.fill();

            ctx.beginPath(); ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, Math.PI * 2 * correctPct, Math.PI * 2);
            ctx.fillStyle = "#ef4444"; ctx.fill();

            ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "#10b981"; ctx.textAlign = "left";
            ctx.fillText(`■ Correct: ${Math.round(correctPct*100)}% (${correct})`, 40, canvas.height - 40);
            ctx.fillStyle = "#ef4444";
            ctx.fillText(`■ Incorrect: ${Math.round(incorrectPct*100)}% (${incorrect})`, 220, canvas.height - 40);
        }

        /*********************************************************************
         * 8. CORE INITIALIZATION EVENTS
         *********************************************************************/
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById("topicsGridContainer");
            topicMetadata.forEach(t => {
                let card = document.createElement("button");
                card.className = "topic-card";
                card.innerHTML = `<div class="topic-badge">${t.count} Qs</div><h3>${t.title}</h3><p>${t.desc}</p>`;
                card.addEventListener("click", () => {
                    AudioEngine.playClick();
                    initiateQuizSession(t.key);
                });
                gridContainer.appendChild(card);
            });

            document.querySelectorAll(".qty-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    AudioEngine.playClick();
                    document.querySelectorAll(".qty-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    state.selectedQuantity = parseInt(btn.getAttribute("data-qty"));
                });
            });

            document.getElementById("registerBtn").addEventListener("click", () => {
                AudioEngine.playClick();
                let name = document.getElementById("studentNameInput").value.trim();
                if (!name) {
                    alert("Please fill in your full name before starting!");
                    return;
                }
                saveProfile(name);
            });

            document.getElementById("logoutBtn").addEventListener("click", () => {
                AudioEngine.playClick();
                if (confirm("Are you sure you want to log out? Your user record history will safely remain stored.")) {
                    performLogout();
                }
            });

            document.getElementById("quickStartBtn").addEventListener("click", () => {
                AudioEngine.playClick(); showScreen("dashboardScreen");
            });

            document.getElementById("exitQuizBtn").addEventListener("click", () => {
                AudioEngine.playClick();
                if (confirm("Are you sure you want to quit this active quiz run? Progress won't be saved.")) {
                    state.sessionQuestions.forEach(q => delete q.shuffledOptions);
                    showScreen("dashboardScreen");
                }
            });

            document.getElementById("resBackToDashBtn").addEventListener("click", () => {
                AudioEngine.playClick(); updateDashboardMetrics(); showScreen("dashboardScreen");
            });

            document.querySelectorAll(".tab-bar .tab-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    AudioEngine.playClick(); showScreen(btn.getAttribute("data-target"));
                });
            });

            document.getElementById("refreshLeaderboardBtn").addEventListener("click", () => {
                AudioEngine.playClick(); populateLeaderboardTable();
            });

            document.getElementById("clearLeaderboardBtn").addEventListener("click", () => {
                AudioEngine.playClick();
                if (confirm("Warning! This deletes all high scores globally. Do you wish to proceed?")) {
                    localStorage.removeItem("bijak_leaderboard"); populateLeaderboardTable();
                }
            });

            document.getElementById("themeBtn").addEventListener("click", () => {
                AudioEngine.playClick();
                state.currentTheme = state.currentTheme === "light" ? "dark" : "light";
                document.documentElement.setAttribute("data-theme", state.currentTheme);
                localStorage.setItem("bijak_theme", state.currentTheme);
                document.getElementById("themeBtn").textContent = state.currentTheme === "light" ? "🌙" : "☀️";
                if(state.activeTopicKey && !document.getElementById("statisticsScreen").classList.contains("hidden")) {
                    populateStatisticsView();
                }
            });

            document.getElementById("muteBtn").addEventListener("click", () => {
                isMuted = !isMuted;
                localStorage.setItem("bijak_muted", isMuted);
                document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🔊";
                AudioEngine.playClick();
            });

            loadApplicationState();
        });
    </script>
